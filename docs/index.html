<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CORRR — Conquista tu ciudad corriendo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0A0A0A;
      color: #E0E0E0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      text-align: center;
    }
    .logo { font-size: 64px; font-weight: 900; color: #FF6600; letter-spacing: -3px; margin-bottom: 16px; }
    .tagline { font-size: 20px; color: #888; margin-bottom: 48px; }
    .badge {
      display: inline-block;
      background: #FF6600;
      color: #fff;
      font-weight: 800;
      font-size: 15px;
      padding: 14px 32px;
      border-radius: 100px;
      margin-bottom: 16px;
      text-decoration: none;
    }
    .coming { font-size: 13px; color: #444; margin-bottom: 48px; }
    nav a { color: #555; font-size: 13px; margin: 0 12px; text-decoration: none; }
    nav a:hover { color: #FF6600; }

</head>
<body>
  <div class="logo">CORRR</div>
  <p class="tagline">Conquista tu ciudad corriendo</p>
  <a class="badge" href="https://play.google.com/store">Próximamente en Google Play</a>
  <p class="coming">iOS llegará pronto</p>
  <nav>
    <a href="/privacy.html">Política de Privacidad</a>
