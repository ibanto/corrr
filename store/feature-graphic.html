<!DOCTYPE html>
<html>
<head>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1024px; height: 500px; overflow: hidden; }
  .banner {
    width: 1024px;
    height: 500px;
    background: linear-gradient(135deg, #0A0A0A 0%, #1A0A00 50%, #0A0A0A 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    position: relative;
    font-family: -apple-system, sans-serif;
  }
  .glow {
    position: absolute;
    width: 400px;
    height: 400px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,102,0,0.15) 0%, transparent 70%);
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
  }
  .logo {
    font-size: 96px;
    font-weight: 900;
    color: #FF6600;
    letter-spacing: -3px;
    position: relative;
    z-index: 1;
    text-shadow: 0 0 60px rgba(255,102,0,0.3);
  }
  .tagline {
    font-size: 24px;
    color: #888;
    font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-top: 12px;
    position: relative;
    z-index: 1;
  }
  .features {
    display: flex;
    gap: 40px;
    margin-top: 32px;
    position: relative;
    z-index: 1;
  }
  .feat {
    text-align: center;
    color: #555;
    font-size: 14px;
    font-weight: 600;
  }
  .feat-icon {
    font-size: 28px;
    margin-bottom: 4px;
  }
</style>
</head>
<body>
  <div class="banner">
    <div class="glow"></div>
    <div class="logo">CORRR</div>
    <div class="tagline">Conquista tu ciudad corriendo</div>
    <div class="features">
      <div class="feat"><div class="feat-icon">🗺️</div>Conquista</div>
      <div class="feat"><div class="feat-icon">⚔️</div>Compite</div>
      <div class="feat"><div class="feat-icon">🏆</div>Domina</div>
    </div>
  </div>
</body>
</html>
